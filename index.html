<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UCA Emprende — Nueva Home</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="responsive.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--color-bg-base); color: var(--color-text-body); }
    * { box-sizing: border-box; }
    a { color: inherit; }
    strong { font-weight: 700; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/Primitives.jsx"></script>
  <script type="text/babel" src="src/Layout.jsx"></script>
  <script type="text/babel" src="src/Cards.jsx"></script>
  <script type="text/babel" src="src/HeroAnimationCompact.jsx"></script>
  <script type="text/babel" src="src/HeroEditorial.jsx"></script>
  <script type="text/babel" src="src/FlagshipAndActivities.jsx"></script>
  <script type="text/babel" src="src/ServicesAndOlivillo.jsx"></script>
  <script type="text/babel" src="src/StoriesAndNewsletter.jsx"></script>
  <script type="text/babel" src="src/NuevaHome.jsx"></script>
  <script type="text/babel" src="src/TweaksPanel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentIntensity": "normal",
      "showFlagship": false,
      "showStories": true,
      "density": "airy",
      "homeActivities": 4
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      // ?edit en la URL abre el panel de tweaks (útil para alternar 4/6 en vivo durante la revisión)
      const [editMode, setEditMode] = useState(() => new URLSearchParams(window.location.search).has("edit"));

      useEffect(() => {
        const handler = (e) => {
          if (!e.data || typeof e.data !== "object") return;
          if (e.data.type === "__activate_edit_mode") setEditMode(true);
          if (e.data.type === "__deactivate_edit_mode") setEditMode(false);
        };
        window.addEventListener("message", handler);
        try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch (err) {}
        return () => window.removeEventListener("message", handler);
      }, []);

      // Navegación entre páginas de la preview
      const PAGES = { inicio: "index.html", actividades: "actividades.html", coworking: "coworking.html", actividad: "actividad.html" };
      const navigate = (page) => { const u = PAGES[page]; if (u) window.location.href = u; };

      return (
        <div>
          <IntranetBar />
          <Header current="inicio" onNavigate={navigate} />
          <div data-screen-label="01 Home">
            <NuevaHome tweaks={tweaks} onNavigate={navigate} />
          </div>
          <Footer />
          <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} visible={editMode} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
